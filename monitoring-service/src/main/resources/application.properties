server.port=8082
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.application.name=monitoring-service
spring.cloud.stream.bindings.stateUpdater-in-0.destination=valid-measurements
spring.cloud.stream.bindings.stateUpdater-in-0.group=monitoring-group
spring.cloud.stream.function.definition=stateUpdater
spring.cloud.stream.kafka.binder.brokers=localhost:9092
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Prometheus metrike
management.endpoints.web.exposure.include=health,info,prometheus