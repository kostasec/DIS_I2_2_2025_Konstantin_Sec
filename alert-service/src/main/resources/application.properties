server.port=8083
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.application.name=alert-service

spring.cloud.stream.bindings.alertHandler-in-0.destination=threshold-breaches
spring.cloud.stream.bindings.alertHandler-in-0.group=alert-group
spring.cloud.stream.function.definition=alertHandler
spring.cloud.stream.kafka.binder.brokers=localhost:9092
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Prometheus metrike
management.endpoints.web.exposure.include=health,info,prometheus