name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Pokrece unit + integracione testove (Testcontainers - Docker je dostupan na runner-u).
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - processing-service
          - monitoring-service
          - alert-service
          - ingest-service
          - device-registry-service
          - telemetry-composite-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  # Gradi jar za svih 8 servisa (dokaz da sve pakuje).
  package:
    name: Package ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - gateway-service
          - device-registry-service
          - monitoring-service
          - alert-service
          - telemetry-composite-service
          - ingest-service
          - processing-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build jar
        working-directory: ${{ matrix.service }}
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar --no-daemon -x test
