server.port=8086
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.application.name=processing-service

spring.cloud.stream.bindings.processRawMeasurement-in-0.destination=raw-measurements
spring.cloud.stream.bindings.processRawMeasurement-in-0.group=processing-group
spring.cloud.stream.bindings.processRawMeasurement-out-0.destination=valid-measurements
spring.cloud.stream.kafka.binder.brokers=localhost:9092
spring.cloud.stream.function.definition=processRawMeasurement
spring.cloud.stream.bindings.thresholdBreachProducer-out-0.destination=threshold-breaches

# Circuit breaker stanje vidljivo preko /actuator/health
management.endpoints.web.exposure.include=health,info
management.health.circuitbreakers.enabled=true
management.endpoint.health.show-details=always