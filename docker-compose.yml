services:

  mysql:
    image: mysql:8.0
    container_name: dis-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devicedb
      MYSQL_USER: dis
      MYSQL_PASSWORD: dis123
    ports:
      - "3306:3306"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dis-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dis-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  device-registry-service:
    build:
      context: ./device-registry-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devicedb
      SPRING_DATASOURCE_USERNAME: dis
      SPRING_DATASOURCE_PASSWORD: dis123
    depends_on:
      - mysql

  monitoring-service:
    build:
      context: ./monitoring-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092

  alert-service:
    build:
      context: ./alert-service
    ports:
      - "8083:8083"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092

  telemetry-composite-service:
    build:
      context: ./telemetry-composite-service
    ports:
      - "8084:8084"
    depends_on:
      - device-registry-service
      - monitoring-service
      - alert-service

  ingest-service:
    build:
      context: ./ingest-service
    ports:
      - "8085:8085"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092

  processing-service:
    build:
      context: ./processing-service
    ports:
      - "8086:8086"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:29092