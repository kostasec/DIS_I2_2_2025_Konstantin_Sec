server.port=8080
spring.application.name=gateway-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=ingest-service
spring.cloud.gateway.routes[0].uri=lb://ingest-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/ingest/**

spring.cloud.gateway.routes[1].id=monitoring-service
spring.cloud.gateway.routes[1].uri=lb://monitoring-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/monitoring/**

spring.cloud.gateway.routes[2].id=alert-service
spring.cloud.gateway.routes[2].uri=lb://alert-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/alert/**

spring.cloud.gateway.routes[3].id=telemetry-composite-service
spring.cloud.gateway.routes[3].uri=lb://telemetry-composite-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/telemetry/**

spring.cloud.gateway.routes[4].id=device-registry-service
spring.cloud.gateway.routes[4].uri=lb://device-registry-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/device/**