global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'dis-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'eureka-server:8761'
          - 'gateway-service:8080'
          - 'device-registry-service:8081'
          - 'monitoring-service:8082'
          - 'alert-service:8083'
          - 'telemetry-composite-service:8084'
          - 'ingest-service:8085'
          - 'processing-service:8086'
